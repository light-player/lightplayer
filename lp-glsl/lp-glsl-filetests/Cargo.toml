[package]
name = "lp-glsl-filetests"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
lp-glsl-core = { path = "../lp-glsl-core" }
lp-glsl-diagnostics = { path = "../lp-glsl-diagnostics", features = ["std"] }
lp-glsl-exec = { path = "../lp-glsl-exec" }
lp-glsl-frontend = { path = "../lp-glsl-frontend" }
lp-glsl-naga = { path = "../lp-glsl-naga" }
lp-glsl-values = { path = "../lp-glsl-values", features = ["std"] }
lp-glsl-wasm = { path = "../lp-glsl-wasm" }
lpir = { path = "../lpir" }
lpir-cranelift = { path = "../lpir-cranelift", features = ["riscv32-emu"] }
lp-riscv-elf = { path = "../../lp-riscv/lp-riscv-elf" }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", features = ["std"] }
lp-riscv-inst = { path = "../../lp-riscv/lp-riscv-inst" }
wasmtime = "42"
wasm-encoder = "0.245"
wasmprinter = "0.245"
anyhow = { workspace = true }
regex = { workspace = true }
walkdir = "2"
glob = { workspace = true }
num_cpus = "1.17.0"
glsl = { git = "https://github.com/light-player/glsl-parser.git", branch = "feature/spans", default-features = false, features = ["std"] }

[[test]]
name = "filetests"
harness = true
