[package]
name = "lp-glsl-exec"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "GlslExecutable trait for pluggable GLSL backends (new stack)"

[lints]
workspace = true

[dependencies]
lpsc-shared = { path = "../lpsc-shared" }
lp-glsl-diagnostics = { path = "../lp-glsl-diagnostics", default-features = false }
lpvm = { path = "../lpvm", default-features = false }

[features]
default = ["std"]
std = ["lp-glsl-diagnostics/std", "lpvm/std"]
