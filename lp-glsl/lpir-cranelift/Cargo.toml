[package]
name = "lpir-cranelift"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Experimental LPIR → Cranelift JIT (Stage II)"
build = "build.rs"

[lints]
workspace = true

[features]
default = []
# RISC-V32 relocatable object, link with builtins ELF, in-tree emulator smoke tests.
riscv32-emu = [
    "dep:cranelift-object",
    "dep:lp-riscv-elf",
    "dep:lp-riscv-emu",
    "cranelift-codegen/riscv32",
]

[dependencies]
lp-glsl-builtin-ids = { path = "../lp-glsl-builtin-ids" }
lp-glsl-builtins = { path = "../lp-glsl-builtins" }
lp-glsl-naga = { path = "../lp-glsl-naga" }
lpir = { path = "../lpir" }
cranelift-codegen = { workspace = true, default-features = false, features = ["std", "host-arch"] }
cranelift-frontend = { workspace = true, features = ["std"] }
cranelift-module = { workspace = true, features = ["std"] }
cranelift-jit = { workspace = true, features = ["std"] }
cranelift-native = { workspace = true }
cranelift-object = { workspace = true, optional = true }
target-lexicon = { workspace = true }
lp-riscv-elf = { path = "../../lp-riscv/lp-riscv-elf", optional = true }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", optional = true, features = ["std"] }
