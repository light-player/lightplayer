[package]
name = "lp-glsl-values"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "GLSL runtime values and literal parsing (new stack)"

[lints]
workspace = true

[dependencies]
lp-glsl-diagnostics = { path = "../lp-glsl-diagnostics", default-features = false }
glsl = { git = "https://github.com/light-player/glsl-parser.git", branch = "feature/spans", default-features = false }

[features]
default = ["std"]
std = ["glsl/std", "lp-glsl-diagnostics/std"]
