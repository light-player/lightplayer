[package]
name = "lpvm"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "GLSL ABI - types, values, layout, and paths"

[lints]
workspace = true

[dependencies]
lps-types = { path = "../lps-types" }
lp-glsl-diagnostics = { path = "../lp-glsl-diagnostics", default-features = false }
glsl = { git = "https://github.com/light-player/glsl-parser.git", branch = "feature/spans", default-features = false, optional = true }

[features]
default = ["std", "parse"]
std = ["glsl?/std", "lp-glsl-diagnostics/std"]
parse = ["dep:glsl"]  # Enables GlslValue::parse() - requires glsl parser
