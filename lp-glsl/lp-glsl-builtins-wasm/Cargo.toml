[package]
name = "lp-glsl-builtins-wasm"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "WASM cdylib exporting lp-glsl-builtins for shader linking (imported memory)"
build = "build.rs"

[lints]
workspace = true

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# `std` enables the log path in lp-glsl-builtins; wasm32-unknown-unknown has `std` and supplies the global allocator for `cdylib`.
lp-glsl-builtins = { path = "../lp-glsl-builtins", default-features = false, features = ["std"] }
