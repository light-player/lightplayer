kind = "Fixture"
color_order = "rgb"
brightness = 64
gamma_correction = true

[bindings.input]
source = "bus#visual.out"

[bindings.output]
target = "bus#control.out"

[render_size]
width = 16
height = 16

[mapping]
kind = "PathPoints"
sample_diameter = 2.0

[mapping.paths.0]
kind = "RingArray"
center = [0.5, 0.5]
diameter = 1.0
start_ring_inclusive = 0
end_ring_exclusive = 1
offset_angle = 0.0
order = "inner_first"

[mapping.paths.0.ring_lamp_counts]
0 = 1
