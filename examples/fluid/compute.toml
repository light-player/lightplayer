kind = "ComputeShader"
source = { path = "compute.glsl" }

[bindings.emitters]
target = "bus#fluid.emitters"

[bindings.time]
source = "bus#time.seconds"

[consumed_slots.time]
kind = "value"
value = "f32"
default = 0.0

[produced_slots.emitters]
kind = "map"
key = "u32"
value = "lp::fluid::Emitter"
mapping = { kind = "sentinel", len = 4, key = "id", empty_key = 0 }
