kind = "ComputeShader"
source = { path = "event_b.glsl" }

[bindings.events]
target = "bus#trigger"

[bindings.time]
source = "bus#time.seconds"

[consumed.time]
kind = "value"
value = "f32"
default = 0.0

[produced.events]
kind = "map"
key = "u32"
value = "lp::control::Message"
mapping = { kind = "sentinel", len = 8, key = "id", empty_key = 0 }
