<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GLSL → WASM demo</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: system-ui, sans-serif;
        }

        body {
            margin: 0;
            padding: 12px;
            background: #111;
            color: #e0e0e0;
        }

        #app {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-start;
        }

        #editor-pane {
            flex: 1 1 420px;
            min-height: 400px;
        }

        #canvas-pane {
            flex: 0 0 auto;
        }

        #source {
            width: 100%;
            height: 520px;
            box-sizing: border-box;
            font-family: ui-monospace, monospace;
            font-size: 12px;
            background: #1a1a1a;
            color: #d4d4d4;
            border: 1px solid #333;
            padding: 8px;
            resize: vertical;
        }

        #output {
            width: 512px;
            height: 512px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 1px solid #444;
            background: #000;
        }

        #status {
            font-family: ui-monospace, monospace;
            font-size: 11px;
            color: #777;
            margin-top: 6px;
            letter-spacing: 0.02em;
        }

        .tex-size-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            font-size: 12px;
            color: #aaa;
        }

        .tex-size-row input[type="range"] {
            width: 180px;
            accent-color: #6a9;
        }

        .tex-size-row #tex-size-label {
            font-family: ui-monospace, monospace;
            font-size: 11px;
            color: #8c8;
            min-width: 5.5em;
        }

        #errors {
            margin-top: 12px;
            padding: 8px;
            background: #2a1515;
            border: 1px solid #633;
            color: #f88;
            font-family: ui-monospace, monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow: auto;
        }

        #errors:empty {
            display: none;
        }
    </style>
</head>
<body>
<h1>GLSL → WASM (Q32)</h1>
<p style="font-size: 13px; color: #888;">Compiler runs in the browser. Edit GLSL; recompiles after a
    short pause.</p>
<div id="app">
    <div id="editor-pane">
        <textarea id="source" spellcheck="false" placeholder="Loading default shader…"></textarea>
    </div>
    <div id="canvas-pane">
        <canvas id="output" width="64" height="64"></canvas>
        <div id="status"></div>
        <div class="tex-size-row">
            <label for="tex-size">Texture</label>
            <input type="range" id="tex-size" min="0" max="16" value="8" step="1"
                   aria-valuemin="0" aria-valuemax="16" aria-label="Texture size"/>
            <span id="tex-size-label" aria-live="polite">64×64</span>
        </div>
    </div>
</div>
<pre id="errors"></pre>

<script type="module">
  import init, {compile_glsl} from './pkg/web_demo.js';

  /** log₂ from 4..1024 in half-integer steps: 2^2, 2^2.5, …, 2^10 (rounded). */
  const TEXTURE_SIZES = (() => {
    const out = [];
    for (let k = 0; k <= 16; k++) {
      const exp = 2 + k * 0.5;
      const s = Math.max(4, Math.min(1024, Math.round(2 ** exp)));
      out.push(s);
    }
    return out;
  })();

  const canvas = document.getElementById('output');
  // Default 2D backing store; avoid willReadFrequently — we only write via
  // putImageData each frame, and "read-optimized" mode tanks compositing FPS.
  let ctx = canvas.getContext('2d');
  const sourceEl = document.getElementById('source');
  const errorsEl = document.getElementById('errors');
  const statusEl = document.getElementById('status');
  const texSizeInput = document.getElementById('tex-size');
  const texSizeLabel = document.getElementById('tex-size-label');

  const PIXEL_BUF_OFFSET = 0x20000; // 128KB — above shadow stack region

  let sharedMemory = null;

  let texSize = TEXTURE_SIZES[Number(texSizeInput.value)] ?? 64;
  let imageData = ctx.createImageData(texSize, texSize);

  function pixelBufSize() {
    return texSize * texSize * 4;
  }

  function ensureWasmMemoryForPixelBuffer() {
    const needBytes = PIXEL_BUF_OFFSET + pixelBufSize();
    const needPages = Math.ceil(needBytes / 65536);
    const curPages = sharedMemory.buffer.byteLength / 65536;
    if (needPages > curPages) {
      sharedMemory.grow(needPages - curPages);
    }
  }

  function applyTextureSizeIndex(idx) {
    const n = TEXTURE_SIZES[idx];
    if (n === undefined || n === texSize) return;
    texSize = n;
    ensureWasmMemoryForPixelBuffer();
    canvas.width = n;
    canvas.height = n;
    ctx = canvas.getContext('2d');
    imageData = ctx.createImageData(texSize, texSize);
    texSizeLabel.textContent = `${n}×${n}`;
    resetFrameSamples();
  }
  let builtinsInstance = null;
  let shaderInstance = null;
  let compileTimeout = null;
  let lastError = '';

  async function loadDefaultSource() {
    try {
      const res = await fetch('rainbow-default.glsl');
      if (res.ok) {
        sourceEl.value = await res.text();
        return;
      }
    } catch (_) { /* ignore */
    }
    sourceEl.value = 'vec4 main(vec2 fragCoord, vec2 outputSize, float time) {\n    return vec4(1.0, 0.0, 1.0, 1.0);\n}\n';
  }

  function setError(msg) {
    lastError = msg;
    errorsEl.textContent = msg || '';
  }

  function compileShader(source) {
    try {
      const wasmBytes = compile_glsl(source);
      const module = new WebAssembly.Module(wasmBytes);
      const instance = new WebAssembly.Instance(module, {
        builtins: builtinsInstance.exports,
        env: {memory: sharedMemory},
      });
      shaderInstance = instance;
      resetFrameSamples();
      setError('');
      return true;
    } catch (e) {
      setError(String(e));
      return false;
    }
  }

  function scheduleCompile() {
    clearTimeout(compileTimeout);
    compileTimeout = setTimeout(() => {
      compileShader(sourceEl.value);
    }, 300);
  }

  const FRAME_SAMPLES_CAP = 100;
  const frameUsRing = new Float64Array(FRAME_SAMPLES_CAP);
  let frameUsWrite = 0;
  let frameUsCount = 0;

  function resetFrameSamples() {
    frameUsWrite = 0;
    frameUsCount = 0;
  }

  function pushFrameUsSample(us) {
    frameUsRing[frameUsWrite] = us;
    frameUsWrite = (frameUsWrite + 1) % FRAME_SAMPLES_CAP;
    if (frameUsCount < FRAME_SAMPLES_CAP) {
      frameUsCount++;
    }
  }

  /** @returns {{mean: number, std: number, min: number, max: number, n: number} | null} */
  function frameUsStats() {
    if (frameUsCount < 2) return null;
    const oldest = (frameUsWrite - frameUsCount + FRAME_SAMPLES_CAP) % FRAME_SAMPLES_CAP;
    let sum = 0;
    let min = Infinity;
    let max = -Infinity;
    for (let i = 0; i < frameUsCount; i++) {
      const v = frameUsRing[(oldest + i) % FRAME_SAMPLES_CAP];
      sum += v;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    const mean = sum / frameUsCount;
    let sq = 0;
    for (let i = 0; i < frameUsCount; i++) {
      const v = frameUsRing[(oldest + i) % FRAME_SAMPLES_CAP];
      const d = v - mean;
      sq += d * d;
    }
    const std = Math.sqrt(sq / (frameUsCount - 1));
    return {mean, std, min, max, n: frameUsCount};
  }

  function fmtMsFromUs(us) {
    const ms = us / 1000;
    return ms >= 1 ? ms.toFixed(2) : ms.toFixed(3);
  }

  let frames = 0;
  let lastFpsT = performance.now();
  let frameUsSum = 0;

  function render(timestamp) {
    requestAnimationFrame(render);

    if (!shaderInstance) return;
    const renderFrameFn = shaderInstance.exports.render_frame;
    if (typeof renderFrameFn !== 'function') return;

    const timeSec = timestamp / 1000;
    const q32Time = Math.round(timeSec * 65536);

    const t0 = performance.now();
    try {
      renderFrameFn(texSize, texSize, q32Time, PIXEL_BUF_OFFSET);
    } catch (e) {
      setError('Runtime: ' + e);
      return;
    }
    const frameUs = (performance.now() - t0) * 1000;
    pushFrameUsSample(frameUs);

    const src = new Uint8Array(sharedMemory.buffer, PIXEL_BUF_OFFSET, pixelBufSize());
    imageData.data.set(src);
    ctx.putImageData(imageData, 0, 0);

    frames++;
    frameUsSum += frameUs;
    const now = performance.now();
    if (now - lastFpsT >= 1000) {
      const actualFps = (frames * 1000) / (now - lastFpsT);
      const avgUs = frameUsSum / frames;
      const stats = frameUsStats();
      const meanUsForTheo = stats ? stats.mean : avgUs;
      const theoFps = 1e6 / meanUsForTheo;
      const theoStr =
        theoFps >= 1000 ? (theoFps / 1000).toFixed(1) + 'k' : theoFps.toFixed(0);
      if (lastError) {
        statusEl.textContent = 'error (previous shader still running)';
      } else if (stats) {
        const timeSeg = `${fmtMsFromUs(stats.mean)}±${fmtMsFromUs(stats.std)}ms (${fmtMsFromUs(stats.min)}–${fmtMsFromUs(stats.max)})`;
        statusEl.textContent =
          `${actualFps.toFixed(0)}fps · ${timeSeg} ~${theoStr}fps · ${texSize}×${texSize} · Q32`;
      } else {
        const usStr = avgUs >= 1000 ? (avgUs / 1000).toFixed(1) + 'ms' : avgUs.toFixed(0) + 'µs';
        statusEl.textContent =
          `${actualFps.toFixed(0)}fps · ${usStr} (~${theoStr}fps) · ${WIDTH}×${HEIGHT} · Q32`;
      }
      frames = 0;
      frameUsSum = 0;
      lastFpsT = now;
    }
  }

  async function main() {
    await init();

    const builtinsRes = await fetch('builtins.wasm');
    if (!builtinsRes.ok) {
      setError('Failed to fetch builtins.wasm. Run: just web-demo-build');
      return;
    }
    const builtinsBytes = await builtinsRes.arrayBuffer();

    // Must be >= builtins `env.memory` import minimum (currently 17 pages from
    // `lp_glsl_builtins_wasm.wasm`; wasmtime tests use max(shader, builtins)).
    sharedMemory = new WebAssembly.Memory({initial: 17, maximum: 256});
    const builtinsMod = await WebAssembly.instantiate(builtinsBytes, {
      env: {memory: sharedMemory},
    });
    builtinsInstance = builtinsMod.instance;

    await loadDefaultSource();
    ensureWasmMemoryForPixelBuffer();
    applyTextureSizeIndex(Number(texSizeInput.value));
    compileShader(sourceEl.value);
    sourceEl.addEventListener('input', scheduleCompile);

    texSizeInput.addEventListener('input', () => {
      applyTextureSizeIndex(Number(texSizeInput.value));
    });

    requestAnimationFrame(render);
  }

  main().catch((e) => {
    setError('Startup: ' + e);
  });
</script>
</body>
</html>
