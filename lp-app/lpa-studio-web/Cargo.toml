[package]
name = "lpa-studio-web"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish = false
description = "Static Dioxus web shell for LightPlayer Studio"

[features]
stories = ["dep:lpa-studio-web-story-macros"]

[dependencies]
dioxus = { version = "0.7", features = ["web"] }
dioxus-icons = "0.1"
lpa-studio-ux = { path = "../lpa-studio-ux", features = ["browser-worker", "browser-serial-esp32"] }
lpa-studio-web-story-macros = { path = "../lpa-studio-web-story-macros", optional = true }
web-sys = { version = "0.3", features = ["Location", "Window"] }

[build-dependencies]
syn = { version = "2.0", features = ["full", "parsing"] }

[lints]
workspace = true
