<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LightPlayer Serial Debug</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101417;
        --panel: #171d21;
        --panel-2: #1c2429;
        --line: #334047;
        --text: #f5f3ec;
        --muted: #adb7b7;
        --accent: #92d4bd;
        --warn: #ffcd8a;
        --error: #ff9b9b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(1400px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 28px 0 36px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .status {
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(320px, 440px) minmax(0, 1fr);
        gap: 18px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      section + section {
        margin-top: 14px;
      }

      h2 {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .inline-check {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .inline-check input {
        width: auto;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #0d1113;
        color: var(--text);
        font: inherit;
        padding: 9px 10px;
      }

      textarea {
        min-height: 72px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        padding: 8px 10px;
      }

      button:hover {
        border-color: var(--accent);
      }

      button.primary {
        background: #14372e;
        border-color: #317c67;
      }

      button.warning {
        background: #3a2817;
        border-color: #8a6234;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .readout {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #11171a;
        padding: 9px 10px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        margin-top: 3px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        font-weight: 500;
      }

      .terminal-wrap {
        display: grid;
        grid-template-rows: auto minmax(420px, calc(100vh - 210px));
        gap: 12px;
      }

      .terminal-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .terminal {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #070a0b;
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .line-system {
        color: var(--accent);
      }

      .line-warn {
        color: var(--warn);
      }

      .line-error {
        color: var(--error);
      }

      @media (max-width: 860px) {
        main {
          width: min(100vw - 28px, 720px);
          padding-top: 18px;
        }

        header,
        .layout {
          display: block;
        }

        header .status {
          margin-top: 8px;
        }

        .right {
          margin-top: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>LightPlayer Serial Debug</h1>
          <div class="status" id="support">Checking Web Serial...</div>
        </div>
        <div class="status" id="portLabel">No port selected</div>
      </header>

      <div class="layout">
        <div class="left">
          <section>
            <h2>Port</h2>
            <label>
              Baud rate
              <input id="baudRate" type="number" min="300" step="1" value="115200" />
            </label>
            <div class="row">
              <button class="primary" id="requestPort">Request port</button>
              <button id="openPort">Open</button>
              <button id="closePort">Close</button>
              <button id="snapshotSignals">Signals</button>
            </div>
            <div class="readout">
              <div class="metric">
                <span>Port</span>
                <strong id="portState">none</strong>
              </div>
              <div class="metric">
                <span>Reader</span>
                <strong id="readerState">stopped</strong>
              </div>
              <div class="metric">
                <span>DTR</span>
                <strong id="dtrState">unknown</strong>
              </div>
              <div class="metric">
                <span>RTS</span>
                <strong id="rtsState">unknown</strong>
              </div>
            </div>
          </section>

          <section>
            <h2>Reset</h2>
            <label>
              Read window after reset (ms)
              <input id="readWindowMs" type="number" min="0" step="100" value="5000" />
            </label>
            <label class="inline-check">
              <input id="readDuringReset" type="checkbox" checked />
              Start reader before reset
            </label>
            <label class="inline-check">
              <input id="reopenAfterReset" type="checkbox" />
              Close and reopen before reading
            </label>
            <label class="inline-check">
              <input id="continueAfterSignalFailure" type="checkbox" checked />
              Continue reading if signal control fails
            </label>
            <div class="row">
              <button class="primary" id="resetClassic">Normal reset + read</button>
              <button id="resetUsbJtag">USB-JTAG download reset + read</button>
              <button id="resetRtsOnly">RTS release + read</button>
              <button id="readOnly">Read without reset</button>
            </div>
            <div class="row" style="margin-top: 8px">
              <button id="setDtr0">DTR 0</button>
              <button id="setDtr1">DTR 1</button>
              <button id="setRts0">RTS 0</button>
              <button id="setRts1">RTS 1</button>
            </div>
          </section>

          <section>
            <h2>Custom Sequence</h2>
            <label>
              Commands
              <textarea id="sequence">R0 D0 W100 D1 R0 W100 R1 D0 R1 W100 R0 D0</textarea>
            </label>
            <div class="row">
              <button id="runSequence">Run sequence</button>
              <button id="runSequenceAndRead">Run sequence + read</button>
            </div>
          </section>
        </div>

        <section class="right terminal-wrap">
          <div class="terminal-toolbar">
            <h2>Serial Output</h2>
            <div class="row">
              <button id="startRead">Start read</button>
              <button id="stopRead">Stop read</button>
              <button class="warning" id="clearLog">Clear</button>
            </div>
          </div>
          <div class="terminal" id="terminal" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <script type="module">
      const els = {
        support: document.querySelector("#support"),
        portLabel: document.querySelector("#portLabel"),
        baudRate: document.querySelector("#baudRate"),
        readWindowMs: document.querySelector("#readWindowMs"),
        readDuringReset: document.querySelector("#readDuringReset"),
        reopenAfterReset: document.querySelector("#reopenAfterReset"),
        continueAfterSignalFailure: document.querySelector("#continueAfterSignalFailure"),
        sequence: document.querySelector("#sequence"),
        terminal: document.querySelector("#terminal"),
        portState: document.querySelector("#portState"),
        readerState: document.querySelector("#readerState"),
        dtrState: document.querySelector("#dtrState"),
        rtsState: document.querySelector("#rtsState"),
      };

      let port = null;
      let reader = null;
      let readLoopPromise = null;
      let readStopRequested = false;
      let dtr = null;
      let rts = null;
      let readBuffer = "";

      const decoder = new TextDecoder();

      bind("#requestPort", requestPort);
      bind("#openPort", openPort);
      bind("#closePort", closePort);
      bind("#snapshotSignals", snapshotSignals);
      bind("#startRead", startRead);
      bind("#stopRead", stopRead);
      bind("#clearLog", () => {
        els.terminal.textContent = "";
      });
      bind("#resetUsbJtag", () => resetAndRead(usbJtagReset));
      bind("#resetClassic", () => resetAndRead(classicReset));
      bind("#resetRtsOnly", () => resetAndRead(rtsOnlyReset));
      bind("#readOnly", readOnly);
      bind("#setDtr0", () => setDTR(false));
      bind("#setDtr1", () => setDTR(true));
      bind("#setRts0", () => setRTS(false));
      bind("#setRts1", () => setRTS(true));
      bind("#runSequence", () => runSequence(els.sequence.value));
      bind("#runSequenceAndRead", () => resetAndRead(() => runSequence(els.sequence.value)));

      if ("serial" in navigator) {
        els.support.textContent = "Web Serial available";
      } else {
        els.support.textContent = "Web Serial unavailable in this context";
        logSystem("Web Serial is not available. Use Chrome/Edge on localhost or HTTPS.", "error");
      }
      renderState();

      function bind(selector, handler) {
        document.querySelector(selector).addEventListener("click", () => {
          void run(handler);
        });
      }

      async function run(handler) {
        try {
          await handler();
        } catch (error) {
          logSystem(errorMessage(error), "error");
        } finally {
          renderState();
        }
      }

      async function requestPort() {
        port = await navigator.serial.requestPort();
        dtr = null;
        rts = null;
        logSystem(`selected ${portLabel(port)}`);
      }

      async function openPort() {
        requirePort();
        if (port.readable || port.writable) {
          logSystem("port already open", "warn");
          return;
        }
        await port.open({ baudRate: baudRate() });
        readBuffer = "";
        logSystem(`opened at ${baudRate()} baud`);
        await snapshotSignals();
      }

      async function closePort() {
        await stopRead();
        if (!port) {
          return;
        }
        if (port.readable || port.writable) {
          await port.close();
          logSystem("closed port");
        }
      }

      async function startRead() {
        requireOpenPort();
        if (reader) {
          logSystem("reader already running", "warn");
          return;
        }
        readStopRequested = false;
        reader = port.readable.getReader();
        els.readerState.textContent = "running";
        logSystem("started raw read");
        readLoopPromise = readLoop(reader);
      }

      async function stopRead() {
        readStopRequested = true;
        const currentReader = reader;
        if (!currentReader) {
          return;
        }
        try {
          await currentReader.cancel();
        } catch (error) {
          logSystem(`reader cancel failed: ${errorMessage(error)}`, "warn");
        }
        try {
          await readLoopPromise;
        } finally {
          readLoopPromise = null;
        }
      }

      async function readLoop(activeReader) {
        try {
          for (;;) {
            const { value, done } = await activeReader.read();
            if (done) {
              break;
            }
            if (value) {
              appendSerial(value);
            }
          }
        } catch (error) {
          if (!readStopRequested) {
            logSystem(`read failed: ${errorMessage(error)}`, "error");
          }
        } finally {
          try {
            activeReader.releaseLock();
          } catch {}
          if (reader === activeReader) {
            reader = null;
          }
          renderState();
          logSystem("reader stopped");
        }
      }

      async function resetAndRead(resetFn) {
        requirePort();
        await stopRead();
        if (!(port.readable || port.writable)) {
          await openPort();
        }
        readBuffer = "";
        if (els.readDuringReset.checked && !els.reopenAfterReset.checked) {
          await startRead();
        }
        logSystem("reset sequence starting");
        try {
          await resetFn();
          logSystem("reset sequence complete");
        } catch (error) {
          logSystem(`reset sequence failed: ${errorMessage(error)}`, "error");
          if (!els.continueAfterSignalFailure.checked) {
            throw error;
          }
          logSystem("continuing read after reset failure", "warn");
        }
        if (els.reopenAfterReset.checked) {
          await closePort();
          await sleep(250);
          await openPort();
        }
        if (!reader) {
          await startRead();
        }
        const ms = readWindowMs();
        if (ms > 0) {
          await sleep(ms);
          await stopRead();
          logSystem(`read window complete (${ms}ms)`);
        }
      }

      async function readOnly() {
        requirePort();
        await stopRead();
        if (!(port.readable || port.writable)) {
          await openPort();
        }
        readBuffer = "";
        await startRead();
        const ms = readWindowMs();
        if (ms > 0) {
          await sleep(ms);
          await stopRead();
          logSystem(`read window complete (${ms}ms)`);
        }
      }

      async function classicReset() {
        logSystem("classic RTS reset: D0 W100 R1 W100 R0");
        await setDTR(false);
        await sleep(100);
        await setRTS(true);
        await sleep(100);
        await setRTS(false);
      }

      async function usbJtagReset() {
        logSystem("USB-JTAG download reset: R0 D0 W100 D1 R0 W100 R1 D0 R1 W100 R0 D0");
        await setRTS(false);
        await setDTR(false);
        await sleep(100);
        await setDTR(true);
        await setRTS(false);
        await sleep(100);
        await setRTS(true);
        await setDTR(false);
        await setRTS(true);
        await sleep(100);
        await setRTS(false);
        await setDTR(false);
      }

      async function rtsOnlyReset() {
        logSystem("RTS-only reset: R1 W100 R0");
        await setRTS(true);
        await sleep(100);
        await setRTS(false);
      }

      async function runSequence(text) {
        requireOpenPort();
        const commands = text
          .split(/[\s|,]+/)
          .map((command) => command.trim())
          .filter(Boolean);
        logSystem(`running custom sequence: ${commands.join(" ")}`);
        for (const command of commands) {
          const op = command[0]?.toUpperCase();
          const arg = command.slice(1);
          if (op === "D") {
            await setDTR(parseBinaryArg(command, arg));
          } else if (op === "R") {
            await setRTS(parseBinaryArg(command, arg));
          } else if (op === "W") {
            const ms = Number(arg);
            if (!Number.isFinite(ms) || ms < 0) {
              throw new Error(`invalid wait command: ${command}`);
            }
            logSystem(`wait ${ms}ms`);
            await sleep(ms);
          } else {
            throw new Error(`unknown sequence command: ${command}`);
          }
        }
      }

      async function setDTR(value) {
        requireOpenPort();
        const next = Boolean(value);
        try {
          await port.setSignals({ dataTerminalReady: next });
        } catch (error) {
          throw new Error(`DTR=${Number(next)} failed: ${errorMessage(error)}`);
        }
        dtr = next;
        renderState();
        logSystem(`DTR=${Number(dtr)}`);
      }

      async function setRTS(value) {
        requireOpenPort();
        const next = Boolean(value);
        try {
          await port.setSignals({ requestToSend: next });
        } catch (error) {
          throw new Error(`RTS=${Number(next)} failed: ${errorMessage(error)}`);
        }
        rts = next;
        renderState();
        logSystem(`RTS=${Number(rts)}`);
      }

      async function snapshotSignals() {
        requireOpenPort();
        if (typeof port.getSignals !== "function") {
          logSystem("getSignals() is not available for this port", "warn");
          return;
        }
        const signals = await port.getSignals();
        logSystem(`signals: ${JSON.stringify(signals)}`);
      }

      function appendSerial(bytes) {
        const text = decoder.decode(bytes, { stream: true });
        readBuffer += text;
        appendText(text);
      }

      function appendText(text) {
        els.terminal.append(document.createTextNode(text));
        els.terminal.scrollTop = els.terminal.scrollHeight;
      }

      function logSystem(message, level = "system") {
        const line = document.createElement("div");
        line.className = `line-${level}`;
        line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        els.terminal.append(line);
        els.terminal.scrollTop = els.terminal.scrollHeight;
      }

      function renderState() {
        els.portState.textContent = port
          ? port.readable || port.writable
            ? "open"
            : "selected"
          : "none";
        els.readerState.textContent = reader ? "running" : "stopped";
        els.dtrState.textContent = dtr == null ? "unknown" : String(Number(dtr));
        els.rtsState.textContent = rts == null ? "unknown" : String(Number(rts));
        els.portLabel.textContent = port ? portLabel(port) : "No port selected";
      }

      function requirePort() {
        if (!port) {
          throw new Error("No serial port selected.");
        }
      }

      function requireOpenPort() {
        requirePort();
        if (!(port.readable || port.writable)) {
          throw new Error("Serial port is not open.");
        }
      }

      function baudRate() {
        const value = Number(els.baudRate.value);
        if (!Number.isInteger(value) || value <= 0) {
          throw new Error("Invalid baud rate.");
        }
        return value;
      }

      function readWindowMs() {
        const value = Number(els.readWindowMs.value);
        if (!Number.isFinite(value) || value < 0) {
          throw new Error("Invalid read window.");
        }
        return value;
      }

      function parseBinaryArg(command, arg) {
        if (arg !== "0" && arg !== "1") {
          throw new Error(`invalid binary command: ${command}`);
        }
        return arg === "1";
      }

      function portLabel(value) {
        const info = value.getInfo?.() ?? {};
        const vendor = hex(info.usbVendorId);
        const product = hex(info.usbProductId);
        if (vendor && product) {
          return `USB ${vendor}:${product}`;
        }
        return "Serial port";
      }

      function hex(value) {
        return typeof value === "number" ? value.toString(16).padStart(4, "0") : null;
      }

      function errorMessage(error) {
        return error instanceof Error ? error.message : String(error);
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }
    </script>
  </body>
</html>
