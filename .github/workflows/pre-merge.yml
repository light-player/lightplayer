name: CI

on:
  pull_request:
    branches: ["main", "feature/*"]
  push:
    branches: ["main"]

# Cancel stale in-flight runs when new commits land on the same ref, except on
# main where every push should be validated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  RUST_BACKTRACE: 1
  RISC_V_TARGET: riscv32imac-unknown-none-elf
  # Work around rustup rename failures on overlay/cross-device filesystems (ARM runners, Docker)
  RUSTUP_PERMIT_COPY_RENAME: 1

jobs:
  # validate-x64 disabled: the x86_64 host JIT path is `lpvm-cranelift`, which
  # is on the deprecation path (M4b will swap host backends to wasmtime via
  # `lpvm-wasm`). Until then, x86_64-only failures in the cranelift host JIT
  # (e.g. `lp-engine::tests::partial_state_updates` on x86_64) are not worth
  # chasing — the production target is RV32 (`lpvm-native`), validated on
  # ARM where Cranelift host codegen happens to agree with what the JIT'd
  # shaders expect. Re-enable once the host backend swap is complete.
  #
  # validate-x64:
  #   name: Validate (x64)
  #   runs-on: ubuntu-24.04
  #   # x64: full check + build + test
  #   steps:
  #     - name: Install system deps (libudev for serialport)
  #       run: sudo apt-get update && sudo apt-get install -y libudev-dev
  #
  #     - name: Checkout lp2025
  #       uses: actions/checkout@v4
  #       with:
  #         path: lp2025
  #
  #     - name: Checkout lp-regalloc2
  #       uses: actions/checkout@v4
  #       with:
  #         repository: light-player/lp-regalloc2
  #         path: lp-regalloc2
  #
  #     - name: Install Rust toolchain
  #       uses: dtolnay/rust-toolchain@stable
  #       with:
  #         toolchain: nightly-2026-04-27
  #         components: rustfmt, clippy, rust-src
  #
  #     - name: Install RISC-V target
  #       run: rustup target add ${{ env.RISC_V_TARGET }}
  #
  #     - name: Cache cargo registry
  #       uses: actions/cache@v4
  #       with:
  #         path: |
  #           ~/.cargo/bin/
  #           ~/.cargo/registry/index/
  #           ~/.cargo/registry/cache/
  #           ~/.cargo/git/db/
  #           target/
  #         key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
  #         restore-keys: |
  #           ${{ runner.os }}-${{ runner.arch }}-cargo-
  #
  #     - name: Install just
  #       uses: extractions/setup-just@v3
  #
  #     - name: Validate
  #       run: cd lp2025 && just check build-ci test

  validate-arm:
    name: Validate (ARM)
    runs-on: ubuntu-24.04-arm
    # ARM: full check + build + test (lp-cranelift handles membarrier ENOSYS)
    steps:
      - name: Install system deps (libudev for serialport)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Checkout lp2025
        uses: actions/checkout@v4
        with:
          path: lp2025

      - name: Checkout lp-regalloc2
        uses: actions/checkout@v4
        with:
          repository: light-player/lp-regalloc2
          path: lp-regalloc2

      # Toolchain is pinned in lp2025/rust-toolchain.toml; keep this in sync.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-04-27
          components: rustfmt, clippy, rust-src

      - name: Install RISC-V target
        run: rustup target add ${{ env.RISC_V_TARGET }}

      # The previous actions/cache config listed `target/` at the workspace
      # root, but the repo checks out into `lp2025/`, so build artifacts were
      # never cached and every run was a full cold build. rust-cache handles
      # the cargo registry + the workspace target dir, keys on Cargo.lock and
      # rustc version, and prunes stale artifacts so the cache doesn't grow
      # unboundedly.
      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lp2025 -> target

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Validate
        run: cd lp2025 && just check build-ci test

  # The wgpu-tree workspace members (lp-gfx-wgpu, fw-browser, naga-wasm-poc)
  # are validated in a separate job below. Building `-p lp-gfx-wgpu` unifies
  # cargo features differently from the default-members build, so folding it
  # into `just test` recompiled ~25 crates (the naga fork, wgpu-core/hal, and
  # most of lp-shader) at the tail of every Validate run, and clippy over the
  # wgpu tree added another ~1.5 min. Splitting it out keeps that work off the
  # critical path, and the paths gate skips it entirely on PRs that cannot
  # affect the GPU/wasm-sidecar build (docs, Planning, studio-web, lp-cli).
  #
  # The gate is intentionally conservative: it lists the dependency closure of
  # those crates by directory. Pushes to main always run the job, so anything
  # a filter miss lets through still surfaces on the very next merge.
  detect-gfx-changes:
    name: Detect GFX-relevant changes
    runs-on: ubuntu-24.04
    outputs:
      gfx: ${{ github.event_name != 'pull_request' && 'true' || steps.filter.outputs.gfx }}
      browser: ${{ github.event_name != 'pull_request' && 'true' || steps.filter.outputs.browser }}
    steps:
      - name: Filter changed paths
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gfx:
              - 'lp-gfx/**'
              - 'lp-shader/**'
              - 'lp-riscv/**'
              - 'lp-base/**'
              - 'lp-core/**'
              - 'lp-fw/**'
              - 'lp-app/lpa-server/**'
              - 'lp-app/lpa-client/**'
              - 'lp-app/lpa-link/**'
              - 'lp-app/lpa-studio-core/**'
              - 'lp-app/lpa-fs-opfs/**'
              - 'spikes/naga-wasm-poc/**'
              - 'third_party/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'justfile'
              - '.github/workflows/pre-merge.yml'
            # Dependency closure (by directory) of the two real-browser wasm
            # suites: lpa-fs-opfs (real OPFS + Web Locks) and fw-browser
            # (runtime protocol over wasm). Same conservative-gate philosophy
            # as `gfx` above: misses surface on the next main push.
            browser:
              - 'lp-app/lpa-fs-opfs/**'
              - 'lp-fw/**'
              - 'lp-base/**'
              - 'lp-core/**'
              - 'lp-shader/**'
              - 'lp-gfx/**'
              - 'lp-riscv/**'
              - 'third_party/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'justfile'
              - '.github/workflows/pre-merge.yml'

  validate-gfx:
    name: Validate GFX (ARM)
    runs-on: ubuntu-24.04-arm
    needs: detect-gfx-changes
    if: needs.detect-gfx-changes.outputs.gfx == 'true'
    steps:
      - name: Install system deps (libudev for serialport)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Checkout lp2025
        uses: actions/checkout@v4
        with:
          path: lp2025

      - name: Checkout lp-regalloc2
        uses: actions/checkout@v4
        with:
          repository: light-player/lp-regalloc2
          path: lp-regalloc2

      # Toolchain is pinned in lp2025/rust-toolchain.toml; keep this in sync.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-04-27
          components: rustfmt, clippy, rust-src

      # rust-cache keys on the job id, so this job's cache (wgpu tree) stays
      # separate from validate-arm's and neither evicts the other.
      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lp2025 -> target

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Validate GFX
        run: cd lp2025 && just validate-gfx

  # Real-browser wasm suites: lpa-fs-opfs (real OPFS ops, Web Locks, store
  # round-trip — the Safari-OPFS-corruption defect class) and fw-browser
  # (runtime protocol tests). Both run `cargo test --target
  # wasm32-unknown-unknown` through wasm-bindgen-test-runner against headless
  # Chrome. Runs on x64 (not ARM like the other jobs) because Google Chrome
  # has no linux-arm64 build; GitHub x64 images preinstall Chrome and a
  # matching chromedriver, and host arch is irrelevant for wasm tests.
  validate-browser:
    name: Validate Browser (x64)
    runs-on: ubuntu-24.04
    needs: detect-gfx-changes
    if: needs.detect-gfx-changes.outputs.browser == 'true'
    steps:
      - name: Install system deps (libudev for serialport)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Checkout lp2025
        uses: actions/checkout@v4
        with:
          path: lp2025

      - name: Checkout lp-regalloc2
        uses: actions/checkout@v4
        with:
          repository: light-player/lp-regalloc2
          path: lp-regalloc2

      # Toolchain is pinned in lp2025/rust-toolchain.toml; keep this in sync.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-04-27
          components: rustfmt, clippy, rust-src

      # rust-cache keys on the job id, so this job's cache (wasm32 tree) stays
      # separate from the other validate jobs'. It also caches ~/.cargo/bin,
      # which amortizes the wasm-bindgen-cli install below.
      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lp2025 -> target

      - name: Install just
        uses: extractions/setup-just@v3

      # Pinned to match the workspace wasm-bindgen dep; the just recipes
      # refuse to run with a missing runner and print this exact version.
      - name: Install wasm-bindgen-cli
        run: command -v wasm-bindgen-test-runner >/dev/null || cargo install wasm-bindgen-cli --version 0.2.114

      - name: Browser wasm tests
        run: cd lp2025 && just lpa-fs-opfs-test fw-browser-test

