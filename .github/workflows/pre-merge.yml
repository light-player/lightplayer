name: CI

on:
  pull_request:
    branches: ["feature/*"]
  push:
    branches: ["feature/*"]

env:
  RUST_BACKTRACE: 1
  RISC_V_TARGET: riscv32imac-unknown-none-elf
  # Work around rustup rename failures on overlay/cross-device filesystems (ARM runners, Docker)
  RUSTUP_PERMIT_COPY_RENAME: 1

jobs:
  validate-x64:
    name: Validate (x64)
    runs-on: ubuntu-24.04
    # x64: full check + build + test
    steps:
      - name: Install system deps (libudev for serialport)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Checkout lp2025
        uses: actions/checkout@v4
        with:
          path: lp2025

      - name: Checkout lp-regalloc2
        uses: actions/checkout@v4
        with:
          repository: light-player/lp-regalloc2
          path: lp-regalloc2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Install RISC-V target
        run: rustup target add ${{ env.RISC_V_TARGET }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Validate
        run: cd lp2025 && just check build-ci test

  validate-arm:
    name: Validate (ARM)
    runs-on: ubuntu-24.04-arm
    # ARM: full check + build + test (lp-cranelift handles membarrier ENOSYS)
    steps:
      - name: Install system deps (libudev for serialport)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Checkout lp2025
        uses: actions/checkout@v4
        with:
          path: lp2025

      - name: Checkout lp-regalloc2
        uses: actions/checkout@v4
        with:
          repository: light-player/lp-regalloc2
          path: lp-regalloc2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Install RISC-V target
        run: rustup target add ${{ env.RISC_V_TARGET }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Validate
        run: cd lp2025 && just check build-ci test

