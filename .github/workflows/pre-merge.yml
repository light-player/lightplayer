name: CI

on:
  pull_request:
    branches: ["feature/*"]
  push:
    branches: ["feature/*"]
  workflow_dispatch:
    inputs:
      force_filetests:
        description: "Run GLSL filetests even if shader-impacting files did not change"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  RISC_V_TARGET: riscv32imac-unknown-none-elf
  # Work around rustup rename failures on overlay/cross-device filesystems (ARM runners, Docker)
  RUSTUP_PERMIT_COPY_RENAME: 1

jobs:
  # validate-x64 disabled: the x86_64 host JIT path is `lpvm-cranelift`, which
  # is on the deprecation path (M4b will swap host backends to wasmtime via
  # `lpvm-wasm`). Until then, x86_64-only failures in the cranelift host JIT
  # (e.g. `lp-engine::tests::partial_state_updates` on x86_64) are not worth
  # chasing — the production target is RV32 (`lpvm-native`), validated on
  # ARM where Cranelift host codegen happens to agree with what the JIT'd
  # shaders expect. Re-enable once the host backend swap is complete.
