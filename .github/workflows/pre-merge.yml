  validate-arm:
    name: Validate (ARM)
    runs-on: ubuntu-24.04-arm
    # ARM: full check + build + test (lp-cranelift handles membarrier ENOSYS)
    steps:
      - name: Install system deps (libudev for serialport)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Checkout lp2025
        uses: actions/checkout@v4
        with:
          path: lp2025

      - name: Checkout lp-regalloc2
        uses: actions/checkout@v4
        with:
          repository: light-player/lp-regalloc2
          path: lp-regalloc2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt, clippy, rust-src

      - name: Install RISC-V target
        run: rustup target add ${{ env.RISC_V_TARGET }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lp2025/target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Check and build
        run: cd lp2025 && just check build-ci

      - name: Detect filetest-relevant changes
        id: filetest-changes
        working-directory: lp2025
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_filetests }}" == "true" ]]; then
            echo "run_filetests=true" >> "$GITHUB_OUTPUT"
            echo "Manual run requested filetests."
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            echo "run_filetests=true" >> "$GITHUB_OUTPUT"
            echo "No usable base commit; running filetests."
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "$base"
          changed="$(git diff --name-only "$base" HEAD)"
          echo "$changed"

          if echo "$changed" | grep -Eq '^(Cargo\.lock|Cargo\.toml|rust-toolchain\.toml|justfile|scripts/(build-builtins|filetests)\.sh|\.github/workflows/pre-merge\.yml|third_party/|lp-shader/|lp-riscv/)'; then
            echo "run_filetests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_filetests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        if: steps.filetest-changes.outputs.run_filetests == 'true'
        run: cd lp2025 && just test

      - name: Test without filetests
        if: steps.filetest-changes.outputs.run_filetests != 'true'
        run: cd lp2025 && just test-rust

