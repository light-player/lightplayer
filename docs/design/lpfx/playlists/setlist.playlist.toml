# Composed Visual: ordered list of entries played in sequence.
# Bounded loading: only current + next loaded at a time.
# Default transition for all hops; per-entry override available.
#
# Entry with `duration` advances on a timer.
# Entry without `duration` waits for an external cue.

title       = "DJ setlist"
description = "Four-track choreographed sequence"

[transition]
visual   = "../transitions/crossfade.transition.toml"
duration = 2.0

[[entries]]
visual   = "../patterns/fluid.pattern.toml"
duration = 60.0

[[entries]]
visual   = "../patterns/fbm.pattern.toml"
duration = 90.0

# Override: hard-cut wipe into the psychedelic drop
[entries.transition]
visual   = "../transitions/wipe.transition.toml"
duration = 0.5

[[entries]]
visual   = "../stacks/psychedelic.stack.toml"
duration = 75.0

[[entries]]
visual   = "../patterns/rainbow.pattern.toml"
# no duration → waits for cue (manual advance)

[behavior]
loop = true   # restart from entry 0 after last

# Override descendant defaults. The fbm entry's `time` defaults to bus
# `time`; here we drive it from a beat clock so the noise pulses on tempo.
# `entries/2` is the psychedelic stack; reach into its tint effect.
# Transforms (scale, smoothing) — TBD; for now just direct binds.
[bindings]
"entries/1#time"             = { bus = "audio/beat-clock" }
"entries/2/effects/1#color"  = { bus = "audio/level-rgb" }
"entries/2/effects/1#amount" = { bus = "audio/level" }
