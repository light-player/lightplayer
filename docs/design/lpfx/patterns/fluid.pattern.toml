# BuiltinPattern. References a Rust impl; TOML carries instance config.
# No GLSL — the impl is too expensive / stateful for a shader.

title       = "Fluid"
description = "Stam-style fluid sim with audio-reactive emitters"
author      = "yona"

[builtin]
impl = "fluid"          # registered Rust impl name (e.g. lpfx::builtins::fluid::Fluid)

# All bindable Properties live in [params]. Some (e.g. resolution) may be
# treated as compile-time-only by the impl; binding them at runtime errors
# at bind time. The impl declares which are mutable.

[params.resolution]
type    = "i32"
default = 32
min     = 8
max     = 128

[params.viscosity]
type    = "f32"
default = 0.0001
min     = 0.0
max     = 0.01

[params.fade]
type    = "f32"
default = 0.985
min     = 0.5
max     = 1.0

[params.solver_hz]
type    = "i32"
default = 30

[params.intensity]
type    = "f32"
default = 1.0
min     = 0.0
max     = 5.0

[params.emitter_x]
type    = "f32"
default = 0.5
min     = 0.0
max     = 1.0

[params.emitter_y]
type    = "f32"
default = 0.5
min     = 0.0
max     = 1.0
