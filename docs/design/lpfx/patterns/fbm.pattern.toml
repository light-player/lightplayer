# ShaderPattern using the lpfn_fbm noise builtin.

title       = "FBM noise"
description = "Fractal brownian motion with hue cycling"

[shader]
glsl = """
uniform vec2  outputSize;
uniform float param_time;
uniform float param_scale;
uniform float param_hueShift;
uniform int   param_octaves;

vec4 render(vec2 pos) {
  vec2 uv = pos / outputSize;
  vec2 p = uv * param_scale + vec2(param_time * 0.1, 0.0);
  float n = lpfn_fbm(p, param_octaves, 0u);
  float hue = fract(n + param_hueShift);
  return vec4(lpfn_hue2rgb(hue), 1.0);
}
"""

[params.time]
type = "f32"
bind = { bus = "time" }

[params.scale]
type    = "f32"
default = 4.0
min     = 0.5
max     = 16.0

[params.hueShift]
type    = "f32"
default = 0.0
min     = 0.0
max     = 1.0

[params.octaves]
type    = "i32"
default = 3
min     = 1
max     = 6
ui.stepper = { step = 1 }
