# 2-arity Transition. Directional wipe with a soft edge.

title       = "Wipe"
description = "Directional wipe with soft edge"

[shader]
glsl = """
uniform sampler2D inputA;
uniform sampler2D inputB;
uniform vec2      outputSize;
uniform float     param_time;
uniform float     param_progress;
uniform float     param_angle;
uniform float     param_softness;

vec4 render(vec2 pos) {
  vec2 uv = pos / outputSize;
  vec2 dir = vec2(cos(param_angle), sin(param_angle));
  float d = dot(uv - 0.5, dir) + 0.5;
  float edge = smoothstep(param_progress - param_softness, param_progress + param_softness, d);
  return mix(texture(inputB, uv), texture(inputA, uv), edge);
}
"""

[params.time]
type = "f32"
bind = { bus = "time" }

# `progress` has no default bind — the parent Show drives it via [bindings].
[params.progress]
type    = "f32"
default = 0.0
min     = 0.0
max     = 1.0

[params.angle]
type    = "f32"
default = 0.0
min     = 0.0
max     = 6.283
unit    = "rad"

[params.softness]
type    = "f32"
default = 0.05
min     = 0.001
max     = 0.5
