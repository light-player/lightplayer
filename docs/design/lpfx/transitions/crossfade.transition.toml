# Trivial 2-arity Transition. Linear mix from A to B by progress.

title       = "Crossfade"
description = "Linear A→B mix"

[shader]
glsl = """
uniform sampler2D inputA;
uniform sampler2D inputB;
uniform vec2      outputSize;
uniform float     param_time;
uniform float     param_progress;

vec4 render(vec2 pos) {
  vec2 uv = pos / outputSize;
  return mix(texture(inputA, uv), texture(inputB, uv), param_progress);
}
"""

[params.time]
type = "f32"
bind = { bus = "time" }

# `progress` has no default bind — the parent Show drives it via [bindings].
[params.progress]
type    = "f32"
default = 0.0
min     = 0.0
max     = 1.0
