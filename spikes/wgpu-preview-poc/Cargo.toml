[package]
name = "wgpu-preview-poc"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Spike: authored GLSL + lpfn GLSL prelude → naga wgsl-out → wgpu render, diffed against the Q32 wasm reference. Not for production."

[lints]
workspace = true

[dependencies]
naga = { version = "29.0.0", default-features = false, features = ["glsl-in", "wgsl-out"] }
wgpu = "29"
pollster = "0.3"
png = "0.18"
lps-builtins = { path = "../../lp-shader/lps-builtins" }
lp-shader = { path = "../../lp-shader/lp-shader", features = ["naga"] }
lps-shared = { path = "../../lp-shader/lps-shared" }
lpir = { path = "../../lp-shader/lpir" }
lpvm-wasm = { path = "../../lp-shader/lpvm-wasm" }
