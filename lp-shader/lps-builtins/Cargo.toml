[package]
name = "lps-builtins"
description = "Built-in function implementations for the LightPlayer shader runtime"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["lib"]

[features]
default = []
std = ["log/std"]
test = ["std"]

[dependencies]
lps-builtin-ids = { path = "../lps-builtin-ids" }
lpvm = { path = "../lpvm", default-features = false }
lpfn-impl-macro = { path = "../lpfn-impl-macro" }
lps-q32 = { path = "../lps-q32" }
log = { workspace = true, default-features = false }

[dev-dependencies]
