[package]
name = "lps-builtins-gen-app"
description = "Code generator for lps-builtins and lps-builtin-ids"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "lps-builtins-gen-app"
path = "src/main.rs"

[lib]
name = "lp_builtin_gen"
path = "src/lib.rs"

[dependencies]
syn = { version = "2.0", features = ["full", "parsing"] }
quote = "1.0"
walkdir = "2.5"
proc-macro2 = "1.0"
glsl = { git = "https://github.com/light-player/glsl-parser.git", branch = "feature/spans", default-features = false }

