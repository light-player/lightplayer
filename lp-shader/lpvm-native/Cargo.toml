[package]
name = "lpvm-native"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = []
# Host / filetests: link with builtins ELF and run in lp-riscv-emu (pulls std).
emu = [
    "dep:cranelift-codegen",
    "dep:lpvm-cranelift",
    "dep:lpvm-emu",
    "dep:lp-riscv-elf",
    "dep:lp-riscv-emu",
    "lpvm-cranelift/riscv32-object",
    "lpvm-cranelift/std",
    "lpvm-emu/std",
    "lp-riscv-emu/std",
]

[dependencies]
lpir = { path = "../lpir" }
lp-riscv-inst = { path = "../../lp-riscv/lp-riscv-inst" }
lpvm = { path = "../lpvm" }
lps-shared = { path = "../lps-shared" }
lps-builtin-ids = { path = "../lps-builtin-ids" }
object = { version = "0.37", default-features = false, features = ["write_core", "elf"] }
cranelift-codegen = { workspace = true, optional = true, default-features = false, features = [
    "riscv32",
] }
lp-riscv-elf = { path = "../../lp-riscv/lp-riscv-elf", optional = true }
lpvm-cranelift = { path = "../lpvm-cranelift", optional = true, default-features = false, features = [
    "std",
    "riscv32-object",
] }
lpvm-emu = { path = "../lpvm-emu", optional = true, default-features = false, features = ["std"] }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", optional = true, features = ["std"] }
