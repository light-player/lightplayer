[package]
name = "lpvm-native"
description = "LPIR to RV32 native code generation with pool-based register allocation"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = []
# Enable debug info generation (increases binary size, for development only)
debug = []
# Host: link with builtins ELF and run in lp-riscv-emu (pulls std).
emu = [
    "dep:cranelift-codegen",
    "dep:lpvm-cranelift",
    "dep:lpvm-emu",
    "dep:lp-riscv-elf",
    "dep:lp-riscv-emu",
    "lpvm-cranelift/riscv32-object",
    "lpvm-cranelift/std",
    "lpvm-emu/std",
    "lp-riscv-emu/std",
]

[dependencies]
lpir = { path = "../lpir" }
lp-riscv-inst = { path = "../../lp-riscv/lp-riscv-inst" }
lpvm = { path = "../lpvm" }
lps-shared = { path = "../lps-shared" }
lps-builtin-ids = { path = "../lps-builtin-ids" }
object = { version = "0.37", default-features = false, features = ["write_core", "elf"] }
log = { workspace = true, default-features = false }
cranelift-codegen = { workspace = true, optional = true, default-features = false, features = [
    "riscv32",
] }
lp-riscv-elf = { path = "../../lp-riscv/lp-riscv-elf", optional = true }
lpvm-cranelift = { path = "../lpvm-cranelift", optional = true, default-features = false, features = [
    "std",
    "riscv32-object",
] }
lpvm-emu = { path = "../lpvm-emu", optional = true, default-features = false, features = ["std"] }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", optional = true, features = ["std"] }

[dev-dependencies]
rstest = "0.25"

[target.'cfg(target_arch = "riscv32")'.dependencies]
lps-builtins = { path = "../lps-builtins", default-features = false }
spin = { version = "0.9", default-features = false, features = ["mutex", "spin_mutex"] }
