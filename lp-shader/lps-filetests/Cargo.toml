[package]
name = "lps-filetests"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
lps-shared = { path = "../lps-shared" }
lps-diagnostics = { path = "../lps-diagnostics", features = ["std"] }
lps-exec = { path = "../legacy/lps-exec" }
lps-naga = { path = "../lps-naga" }
lpvm = { path = "../lpvm", features = ["std"] }
lps-wasm = { path = "../legacy/lps-wasm" }
lpir = { path = "../lpir" }
lpir-cranelift = { path = "../legacy/lpir-cranelift", features = ["riscv32-emu"] }
lp-riscv-elf = { path = "../../lp-riscv/lp-riscv-elf" }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", features = ["std"] }
lp-riscv-inst = { path = "../../lp-riscv/lp-riscv-inst" }
wasmtime = "42"
wasm-encoder = "0.245"
wasmprinter = "0.245"
anyhow = { workspace = true }
regex = { workspace = true }
walkdir = "2"
num_cpus = "1"
glob = { workspace = true }
glsl = { git = "https://github.com/light-player/glsl-parser.git", branch = "feature/spans", default-features = false, features = ["std"] }

[[test]]
name = "filetests"
harness = true
