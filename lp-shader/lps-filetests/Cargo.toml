[package]
name = "lps-filetests"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
lps-shared = { path = "../lps-shared" }
lps-diagnostics = { path = "../lps-diagnostics", features = ["std"] }
lps-frontend = { path = "../lps-frontend" }
lpvm = { path = "../lpvm", features = ["std"] }
lpir = { path = "../lpir" }
lpvm-cranelift = { path = "../lpvm-cranelift", features = ["riscv32-object"] }
lpvm-emu = { path = "../lpvm-emu" }
lpvm-wasm = { path = "../lpvm-wasm" }
lp-riscv-elf = { path = "../../lp-riscv/lp-riscv-elf" }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", features = ["std"] }
lp-riscv-inst = { path = "../../lp-riscv/lp-riscv-inst" }
lpvm-native = { path = "../lpvm-native", features = ["emu", "debug"] }
wasmtime = "42"
wasm-encoder = "0.245"
wasmprinter = "0.245"
anyhow = { workspace = true }
regex = { workspace = true }
walkdir = "2"
num_cpus = "1"
glob = { workspace = true }
glsl = { git = "https://github.com/light-player/glsl-parser.git", branch = "feature/spans", default-features = false, features = ["std"] }

[[test]]
name = "filetests"
harness = true
