[package]
name = "lps-filetests-app"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
description = "CLI tool for running lps filetests"
publish = false

[lints]
workspace = true

[[bin]]
name = "lps-filetests-app"
path = "src/main.rs"

[dependencies]
lps-filetests = { path = "../lps-filetests" }
anyhow = { workspace = true }
clap = { version = "4.5", features = ["derive"] }
env_logger = "0.10"
