[package]
name = "lps-exec"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "GlslExecutable trait for pluggable GLSL backends (new stack)"

[lints]
workspace = true

[dependencies]
lps-shared = { path = "../../lps-shared" }
lps-diagnostics = { path = "../../lps-diagnostics", default-features = false }
lpvm = { path = "../../lpvm", default-features = false }

[features]
default = ["std"]
std = ["lps-diagnostics/std", "lpvm/std"]
