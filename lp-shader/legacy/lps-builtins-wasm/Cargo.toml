[package]
name = "lps-builtins-wasm"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "WASM cdylib exporting lps-builtins for shader linking (imported memory)"
build = "build.rs"

[lints]
workspace = true

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# `std` enables the log path in lps-builtins; wasm32-unknown-unknown has `std` and supplies the global allocator for `cdylib`.
lps-builtins = { path = "../../lps-builtins", default-features = false, features = ["std"] }
