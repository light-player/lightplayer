[package]
name = "lp-shader"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "High-level shader compilation and texture API"

[lints]
workspace = true

[features]
default = ["naga-frontend"]
std = []
naga-frontend = ["dep:lps-frontend"]
lps-glsl-frontend = []

[dependencies]
lpir = { path = "../lpir" }
lps-shared = { path = "../lps-shared" }
lpvm = { path = "../lpvm" }
lps-frontend = { path = "../lps-frontend", optional = true, default-features = false }
lps-glsl = { path = "../lps-glsl" }

[dev-dependencies]
lpvm-wasm = { path = "../lpvm-wasm" }
