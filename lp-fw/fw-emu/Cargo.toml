[package]
name = "fw-emu"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
unwinding = { version = "0.2", default-features = false, features = ["unwinder", "fde-static", "personality", "panic"] }
fw-core = { path = "../fw-core", default-features = false, features = ["emu"] }
lpa-server = { path = "../../lp-app/lpa-server", default-features = false, features = ["panic-recovery"] }
lp-gfx-lpvm = { path = "../../lp-gfx/lp-gfx-lpvm", default-features = false }
lpc-hardware = { path = "../../lp-core/lpc-hardware", default-features = false }
lpc-shared = { path = "../../lp-core/lpc-shared", default-features = false }
lpfs = { path = "../../lp-base/lpfs", default-features = false }
lpc-model = { path = "../../lp-core/lpc-model", default-features = false }
lpc-wire = { path = "../../lp-core/lpc-wire", default-features = false }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", default-features = false }
lp-riscv-emu-guest = { path = "../../lp-riscv/lp-riscv-emu-guest" }
lp-perf = { path = "../../lp-base/lp-perf", features = ["syscall"] }
lp-recovery = { workspace = true }
lp-riscv-emu-shared = { path = "../../lp-riscv/lp-riscv-emu-shared" }
lpc-engine = { path = "../../lp-core/lpc-engine", default-features = false, features = ["panic-recovery"] }
lps-builtins = { path = "../../lp-shader/lps-builtins", default-features = false }
hashbrown = { workspace = true }
serde_json = { workspace = true, default-features = false, features = ["alloc"] }
log = { workspace = true, default-features = false }

[features]
default = []
std = []
# Unified profile session (alloc + perf hooks); guest syscall path was renamed from `alloc-trace`.
profile = ["lp-riscv-emu-guest/profile"]
naga = ["lpa-server/naga"]
# Test command __test_unwind: runs catch_unwind test before server loop (for CI)
test_unwind = []

[build-dependencies]

[dev-dependencies]
lpa-client = { path = "../../lp-app/lpa-client", features = ["serial"] }
lpc-hardware = { path = "../../lp-core/lpc-hardware" }
lpc-view = { path = "../../lp-core/lpc-view" }
lp-riscv-elf = { path = "../../lp-riscv/lp-riscv-elf", features = ["std"] }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", features = ["std"] }
lpc-shared = { path = "../../lp-core/lpc-shared" }
lpfs = { path = "../../lp-base/lpfs", features = ["std"] }
tokio = { version = "1", features = ["rt", "macros"] }

[lints]
workspace = true
