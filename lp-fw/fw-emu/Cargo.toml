[package]
name = "fw-emu"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
unwinding = { version = "0.2", default-features = false, features = ["unwinder", "fde-static", "personality", "panic"] }
fw-core = { path = "../fw-core", default-features = false, features = ["emu"] }
lp-server = { path = "../../lp-core/lp-server", default-features = false, features = ["panic-recovery"] }
lp-shared = { path = "../../lp-core/lp-shared", default-features = false }
lp-model = { path = "../../lp-core/lp-model", default-features = false }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", default-features = false }
lp-riscv-emu-guest = { path = "../../lp-riscv/lp-riscv-emu-guest" }
lps-builtins = { path = "../../lp-shader/lps-builtins", default-features = false }
hashbrown = { workspace = true }
serde_json = { workspace = true, default-features = false, features = ["alloc"] }
log = { workspace = true, default-features = false }

[features]
default = ["native-jit"]
# RV32 native JIT shaders (`lpvm-native-fa` `rt_jit`)
native-jit = ["lp-server/native-jit"]
# Cranelift JIT for shaders (comparison); prefer `--no-default-features --features cranelift` for a lean build
cranelift = [
    "lp-server/cranelift",
    "lp-server/cranelift-optimizer",
    "lp-server/cranelift-verifier",
]
alloc-trace = ["lp-riscv-emu-guest/alloc-trace"]
# Test command __test_unwind: runs catch_unwind test before server loop (for CI)
test_unwind = []

[build-dependencies]

[dev-dependencies]
lp-client = { path = "../../lp-core/lp-client", features = ["serial"] }
lp-engine-client = { path = "../../lp-core/lp-engine-client" }
lp-riscv-elf = { path = "../../lp-riscv/lp-riscv-elf", features = ["std"] }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", features = ["std"] }
lp-shared = { path = "../../lp-core/lp-shared" }
tokio = { version = "1", features = ["rt", "macros"] }

[lints]
workspace = true
