[package]
name = "fw-core"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[features]
default = []
std = ["log/std"]
emu = ["ser-write-json", "lpc-wire/ser-write-json"]
esp32 = []

[dependencies]
lpc-model = { path = "../../lp-core/lpc-model", default-features = false }
lpc-wire = { path = "../../lp-core/lpc-wire", default-features = false }
ser-write-json = { version = "0.3", optional = true, default-features = false, features = ["alloc"] }
lpc-shared = { path = "../../lp-core/lpc-shared", default-features = false }
lpa-server = { path = "../../lp-app/lpa-server", default-features = false }
log = { workspace = true, default-features = false }
embassy-sync = "0.7.2"
serde = { workspace = true, default-features = false, features = ["derive", "alloc"] }

[dev-dependencies]
lpc-shared = { path = "../../lp-core/lpc-shared", default-features = false, features = ["std"] }
lpa-server = { path = "../../lp-app/lpa-server", default-features = false, features = ["std"] }
critical-section = { version = "1.2", features = ["std"] }
pollster = "0.3"

[lints]
workspace = true
