[package]
name = "fw-tests"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[features]
test_usb = []

[dependencies]
hashbrown = { workspace = true }
lp-client = { path = "../../lp-app/lp-client", features = ["serial", "emu"] }
lpc-view = { path = "../../lp-core/lpc-view" }
lpc-model = { path = "../../lp-core/lpc-model" }
lpc-wire = { path = "../../lp-core/lpc-wire" }
lpl-model = { path = "../../lp-legacy/lpl-model", default-features = false }
lp-riscv-elf = { path = "../../lp-riscv/lp-riscv-elf", features = ["std"] }
lp-riscv-emu = { path = "../../lp-riscv/lp-riscv-emu", features = ["std"] }
lp-riscv-inst = { path = "../../lp-riscv/lp-riscv-inst" }
lpc-shared = { path = "../../lp-core/lpc-shared" }
lpfs = { path = "../../lp-base/lpfs", features = ["std"] }
tokio = { version = "1", features = ["rt", "macros", "time"] }
async-trait = "0.1"
log = { workspace = true, features = ["std"] }
serde_json = { workspace = true }
serialport = "4.8"

[dev-dependencies]
test-log = { workspace = true }
env_logger = { workspace = true }
serial_test = "3.0"
tempfile = "3"
lp-cli = { path = "../../lp-cli" }

[lints]
workspace = true
