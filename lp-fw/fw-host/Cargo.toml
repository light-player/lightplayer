[package]
name = "fw-host"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
fw-core = { path = "../fw-core", features = ["std"] }
lpa-client = { path = "../../lp-app/lpa-client" }
lpa-server = { path = "../../lp-app/lpa-server" }
lpc-hardware = { path = "../../lp-core/lpc-hardware", features = ["std"] }
lpc-model = { path = "../../lp-core/lpc-model", features = ["std"] }
lpc-shared = { path = "../../lp-core/lpc-shared", features = ["std"] }
lpc-wire = { path = "../../lp-core/lpc-wire", features = ["std"] }
lpfs = { path = "../../lp-base/lpfs", features = ["std"] }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }

[lints]
workspace = true
