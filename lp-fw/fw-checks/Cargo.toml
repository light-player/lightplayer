[package]
name = "fw-checks"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[features]
default = []
std = ["serde/std", "serde_json/std"]
check-shader-compile = []
check-jit-math-perf = []
check-json = []
check-oom = []
