<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>fw-browser smoke</title>
</head>
<body>
<pre id="out">running</pre>
<script type="module">
import init, {
  fw_browser_init_exports,
  create_runtime,
  compile_shader,
  render_first_pixel,
  logs,
  runtime_count,
} from './pkg/fw_browser.js';

const source = `
vec4 render(vec2 fragCoord, vec2 outputSize, float time) {
    return vec4(1.0, 0.0, 0.0, 1.0);
}
`;

const out = document.getElementById('out');

try {
  const exports = await init();
  fw_browser_init_exports(exports);
  const runtimeId = create_runtime('smoke');
  compile_shader(runtimeId, source);
  const rgba = render_first_pixel(runtimeId, 0);
  if (runtime_count() !== 1) {
    throw new Error(`runtime count mismatch: ${runtime_count()}`);
  }
  if (rgba === '0,0,0,0') {
    throw new Error(`unexpected blank pixel: ${rgba}`);
  }
  out.textContent = `ok ${rgba}\n${logs(runtimeId)}`;
  document.documentElement.dataset.smoke = 'ok';
} catch (error) {
  out.textContent = `error ${error?.stack || error}`;
  document.documentElement.dataset.smoke = 'error';
  throw error;
}
</script>
</body>
</html>
