[package]
name = "fw-browser"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish = false
description = "Browser/Web Worker LightPlayer firmware runtime"

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
fw-core = { path = "../fw-core", features = ["std"] }
lpa-server = { path = "../../lp-app/lpa-server" }
lp-gfx-lpvm = { path = "../../lp-gfx/lp-gfx-lpvm" }
lpc-hardware = { path = "../../lp-core/lpc-hardware" }
lpc-model = { path = "../../lp-core/lpc-model" }
lpc-shared = { path = "../../lp-core/lpc-shared" }
lpc-wire = { path = "../../lp-core/lpc-wire" }
lpfs = { path = "../../lp-base/lpfs", features = ["std"] }
lps-shared = { path = "../../lp-shader/lps-shared" }
lpvm-wasm = { path = "../../lp-shader/lpvm-wasm" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
wasm-bindgen = "0.2"

[dev-dependencies]
lpc-view = { path = "../../lp-core/lpc-view" }
wasm-bindgen-test = "0.3"
